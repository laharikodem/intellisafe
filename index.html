<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IntelliSafe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🚨 IntelliSafe</h1>
  <p class="subtitle">Smart Emergency Assistance System</p>

  <!-- INPUT SECTION -->
  <div class="card">
    <label>Describe your situation</label>
    <textarea id="textInput" placeholder="Type or speak your situation..."></textarea>

    <div class="buttons">
      <button onclick="checkSafety()">Check Safety</button>
      <button onclick="startVoice()">🎤 Voice Input</button>
    </div>
  </div>

  <!-- CONTACT SECTION -->
  <div class="card">
    <label>Emergency Contacts</label>

    <select id="contact">
      <option value="">Select Contact</option>
      <option value="919876543210">👩 Mom</option>
      <option value="918765432109">👨 Dad</option>
    </select>

    <div class="add-contact">
      <input type="text" id="newName" placeholder="Name">
      <input type="text" id="newNumber" placeholder="Number (9198xxxxxxx)">
      <button onclick="addContact()">➕ Add</button>
    </div>
  </div>

  <!-- STATUS SECTION -->
  <div class="card status-card">
    <div id="result">System Ready</div>
    <div id="location"></div>
  </div>

  <!-- ALERT BUTTON -->
  <button id="alertBtn" onclick="sendAlert()">🚨 Send Emergency Alert</button>

</div>

<script src="script.js"></script>
</body>
</html>
