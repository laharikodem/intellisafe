<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntelliSafe</title>
<link rel="stylesheet" href="style.css">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
  <h1>🚨 IntelliSafe</h1>
  <p class="subtitle">Smart Emergency Assistance System</p>

  <div class="contacts">
    <h2>Emergency Contacts</h2>
    <div id="contact-list"></div>
    <button class="btn" onclick="addContactPrompt()">➕ Add Contact</button>
  </div>

  <div class="actions">
    <button class="btn alert-btn" onclick="sendAlert()">🚨 Send Alert</button>
    <button class="btn safety-btn" onclick="checkSafety()">🛡️ Check Safety</button>
    <button class="btn location-btn" onclick="shareLocation()">📍 Share Location</button>
  </div>

  <div id="notification" class="notification"></div>
</div>

<script src="script.js"></script>
</body>
</html>
