<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IntelliSafe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🚨 IntelliSafe</h1>
  <p>Your Smart Emergency Assistant</p>

  <textarea id="textInput" placeholder="Type or speak..."></textarea>

  <div class="buttons">
    <button onclick="checkSafety()">Check Safety</button>
    <button onclick="startVoice()">🎤 Speak</button>
  </div>

  <!-- Pre-stored contacts -->
  <select id="contact">
    <option value="">Select Emergency Contact</option>
    <option value="919391512953">👩 Mom</option>
    <option value="919640234022">👨 Dad</option>
    <option value="919059580148">👮 Police</option>
  </select>

  <div id="result"></div>
  <div id="location"></div>

  <button id="alertBtn" onclick="sendAlert()">🚨 Send Alert</button>
</div>

<script src="script.js"></script>
</body>
</html>
